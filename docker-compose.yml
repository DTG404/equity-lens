services:
  equity-lens-postgres:
    image: postgres:16
    container_name: equity-lens-postgres
    environment:
      POSTGRES_USER: equity_lens
      POSTGRES_PASSWORD: equity_lens
      POSTGRES_DB: equity_lens
    ports:
      - "5432:5432"
    volumes:
      - equity_lens_pgdata:/var/lib/postgresql/data

volumes:
  equity_lens_pgdata:
